# MegaMud TUI character config — copy this file and edit for your character.
# All sections are optional. Missing keys fall back to safe defaults.
# CLI args --host and --port override [server] values.

# ── Server ───────────────────────────────────────────────────────────────────
[server]
host = "mud.example.com"
port = 4000
auto_connect = false   # connect automatically on TUI start (pairs with [login] auto_login
                       # for fully hands-off startup; CLI --connect overrides this)

# ── Login ────────────────────────────────────────────────────────────────────
[login]
username   = "your_bbs_login"
password   = "your_password"
character  = "Your Character Name"
auto_login = false   # set to true to enable automatic login on connect
# Defaults detect Worldgroup/Galacticomm ("...have a User-ID...") and common
# MUD prompts. Override with a regex (case-insensitive) if your BBS differs:
# username_prompt = "user-id|type it in and press"
# password_prompt = "password\\s*:"
#
# Handled AUTOMATICALLY (MegaMud-style, no scripting needed, regardless of your script):
#   • the "(N)onstop, (Q)uit, or (C)ontinue?" pager + "Press/Hit any key" pauses -> Enter
#     (works for ANY number of them — the count varies with the who-list/news length)
#   • the "[MAJORMUD]:" menu prompt -> sends "enter" to enter the realm
#   • the "[HP=...]" prompt -> marks "now in game" and starts the bot
# So DON'T script those. menu_prompt is only needed for a reconnect cue ("Already playing").
#
# Scripted login — how the original MegaMud did it (LogonPrompt/LogonReply).
# When you add [[login.script]] steps they DRIVE login in order (the built-in
# detection above becomes the fallback). reply expands {userid}/{pswd}/
# {character}; an empty reply just presses Enter. Put ONLY genuinely BBS-specific
# prompts here (User-ID, password, the BBS menu that launches MajorMud).
# Example for a Galacticomm Worldgroup BBS hosting MajorMud:
#   menu_prompt = "Already playing"
#   [[login.script]]
#   prompt = "User-ID|type it in and press"
#   reply  = "{userid}"
#   [[login.script]]
#   prompt = "[Pp]assword"
#   reply  = "{pswd}"
#   [[login.script]]
#   prompt = "Enter your selection"   # the BBS main menu
#   reply  = "D"                       # the key that launches MajorMud

# ── Combat ───────────────────────────────────────────────────────────────────
[combat]
attack_cmd      = "kill"
flee_threshold  = 0.15    # HP fraction below which we RUN: walk out an exit (one room
                          # per turn, retracing if run_backwards) until safe, then rest.
                          # MegaMud-style — never spams the literal "flee".
flee_rooms      = 4       # how many rooms to retrace when run_backwards (MegaMud RunRooms)
emergency_threshold = 0.0 # HP fraction below which we send emergency_cmd (0 = off)
emergency_cmd   = ""      # critical-HP escape command, e.g. "recall" or "c word of recall"
                          # — sent ONCE, then we fall back to running out. (Our tier;
                          # MegaMud has no recall, only PvP disconnect.)
rest_threshold  = 0.40    # START resting (out of combat) when HP drops below this fraction
rest_mana_pct   = 0.0     # also rest to recover mana below this fraction (0 = off;
                          # casters: set ~0.30 to pause and regen mana between fights)
hp_full_pct     = 0.95    # RESUME at this HP fraction — stop resting here (MegaMud HpFull).
                          # Lower it (e.g. 0.75) to cut rest downtime when grinding.
mana_full_pct   = 0.95    # resume at this mana fraction (MegaMud ManaFull)
backstab        = false
polite_attacks  = false
attack_order    = "first"
mana_attack_pct = 0.20
max_monsters     = 0       # run if more monsters than this in the room (0 = no limit)
max_monster_exp  = 0       # run if summed monster exp exceeds this (0 = no limit)
run_backwards    = false   # retrace recent moves to flee instead of "flee"
run_if_bs_fails  = false   # run away when a backstab attempt fails
monster_priority = []      # attack these names first, e.g. ["ancient dragon"]

# ── Spells ───────────────────────────────────────────────────────────────────
[spells]
attack        = ""
pre_attack    = ""
multi_attack  = ""      # secondary attack spell, alternated with attack
heal          = ""
heal_hp_pct   = 0.50
mana_heal     = ""
mana_heal_pct = 0.30
max_cast_count   = 0       # attack-spell casts per encounter, then melee (0 = unlimited)
cast_weapon_cmd  = ""      # e.g. "arm staff" — switch to casting weapon
melee_weapon_cmd = ""      # e.g. "arm warhammer" — switch to melee weapon

# ── PvP (reaction to other players in the room) ──────────────────────────────
[pvp]
action        = ""         # "" ignore | "flee" | "attack" | "hangup" | any command
spell         = ""         # cast at the player when action = "attack"
flee_rooms    = 2
hangup_delay_s = 0

# [[spells.bless]]
# cmd      = "bless"
# mana_pct = 0.80

# ── Stealth ──────────────────────────────────────────────────────────────────
[stealth]
auto_sneak  = false     # sneak before each move/attack (MegaMud hardcodes the "sneak" verb)
must_sneak  = false     # require a successful sneak before attacking

# ── Navigation ───────────────────────────────────────────────────────────────
[navigation]
loop_path        = ""
auto_start       = false
flee_rooms       = 3
can_pick_locks   = false
can_disarm_traps = false
# Optional dir(s) of your own recorded .MP path files (comma-separate several).
# Loaded ON TOP of the bundled paths, in order: a file with the same FROM->TO
# overrides earlier/bundled ones, new files add new routes/loops.
# e.g. extra_paths_dir = "mypaths, shared/paths"
extra_paths_dir  = ""
auto_search      = false   # search for hidden exits in each new room
search_max       = 3       # search attempts per room
roam             = false   # wander random exits when otherwise idle
bash_doors       = false   # bash closed/locked doors when open/pick fails

# ── Items & Cash ─────────────────────────────────────────────────────────────
[items]
auto_get         = false
auto_cash        = true
inventory_cmd    = "inv"   # command that lists inventory; use "i"/"inventory" if your server rejects "inv"
collect_copper   = true
collect_silver   = true
collect_gold     = true
collect_platinum = true
collect_runic    = false
# Encumbrance gates PICKUP, not movement (MegaMud DontBeHeavy/DontBeMedium): the bot keeps
# walking while Heavy, it just stops grabbing loot/coins that would push it over the cap.
dont_go_heavy    = true    # don't pick up past 67% of max weight
dont_go_medium   = false   # stricter: cap pickup at 33% (stay Light)
drop_coins       = false   # drop cheaper coins (copper/silver) to make room for a better
                           # coin when over the cap (MegaMud DropCoins)
max_wealth       = 0       # bank when copper-equiv wealth exceeds (Phase 8)
min_wealth       = 0       # withdraw when below (Phase 8)

# ── Party ────────────────────────────────────────────────────────────────────
[party]
heal_spell         = ""
heal_hp_pct        = 0.50
wait_hp_pct        = 0.30
wait_max_seconds   = 30
wait_cmd           = "wait"
resume_cmd         = "go"
attack_with_leader = true   # wait for the party leader to engage before attacking
share_cash         = false
status_cmd         = ""        # command that prints the party list ("" = off)
status_interval_s  = 60        # how often to refresh it

# [[party.bless]]
# cmd          = "party bless"
# wait_seconds = 60

# ── AFK ──────────────────────────────────────────────────────────────────────
[afk]
enabled          = false
timeout_minutes  = 5
reply            = "I am AFK"
hangup_on_low_hp = false
alert            = false
popup_missed     = true

# ── Per-player rules ─────────────────────────────────────────────────────────
# [[players]]
# name        = "FriendName"
# friend      = true
# remote_cmds = ["@do", "@loop"]
# dont_heal   = false

# ── UI defaults ──────────────────────────────────────────────────────────────
[ui]
show_right_panel = true
show_stats_bar   = true
default_tab      = "conversations"

[health]
# Cure commands sent automatically when the condition is detected (blank = don't cure)
blind_cmd = ""       # e.g. "cast purify vision"
poison_cmd = ""      # e.g. "cast neutralize poison"
disease_cmd = ""
freedom_cmd = ""     # break hold/paralysis

[safety]
hangup_on_death = true
hangup_players = []  # disconnect immediately if any of these appear in the room
panic_cmd = ""       # sent before a panic hangup
reconnect = false    # auto-reconnect on connection loss
max_redials = 3

[remote]
# Allow trusted players to control the bot via tells (e.g. "@status", "@stop").
enabled = false
# Reply template — adjust to your server's telepath syntax.
tell_format = "/{name} {text}"

# Per-player permissions. remote_cmds is a list of allowed verbs, or ["*"] for all.
# [[players]]
# name = "MyAltChar"
# friend = true
# remote_cmds = ["*"]

[learning]
# Use our own JSON game DB: MD binaries convert/merge in at startup (never
# written); unknown monsters / marks / learned exits persist across sessions.
# The store holds THIS server's .MD data (per-BBS extra_paths_dir override) plus
# learned players/exits, so give each character/BBS its OWN store file
# (e.g. "<character>.gamedb.json") — don't share one across servers.
enabled    = false
store_path = "gamedb.json"

[commerce]
# Travel detours: bank when wealth > items.max_wealth (deposits down to
# items.min_wealth), withdraw when below min_wealth, sell/buy at the shop,
# train when level-ready. Rooms are 4-letter codes; "" disables that detour.
bank_room  = ""
shop_room  = ""
train_room = ""
sell_items = []      # e.g. ["rusty sword", "orc ear"]
buy_items  = []      # keep these stocked, e.g. ["torch"]
auto_train = false

[session]
# Session tracking: capture raw server output, exp-rate floor with logoff/relog,
# and a max-hours cutoff.
capture_file      = ""        # append raw server lines here ("" = off)
max_hours_per_day = 0         # hangup after this many hours (0 = unlimited)
min_exp_rate      = 0         # exp/hour floor (0 = disabled)
grace_minutes     = 15        # no rate enforcement during warmup
low_rate_action   = "hangup"  # "hangup" | "relog" when below min_exp_rate
logout_cmd        = "x"       # command that exits the game cleanly

# ── Timed events (the original's .ini [Schedule] EventN entries) ─────────────
# [[schedule.events]]
# type          = "relog"     # logon|logoff|relog|goto|command|loop
# every_seconds = 3600
# count         = 0           # 0 = forever
# arg           = ""          # goto: room code; command: template; loop: name

# Web control panel (browser UI). Optional; off by default.
# When enabled, the bot starts a FastAPI server bound to host:port.
# SECURITY: binds 127.0.0.1 by default. The panel can SEND game commands.
# Do NOT change host to 0.0.0.0 / expose publicly without adding auth.
[web]
enabled = false
host    = "127.0.0.1"
port    = 8080
